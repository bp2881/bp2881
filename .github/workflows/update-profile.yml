name: Auto update profile monthly

on:
  schedule:
    - cron: "0 0 1 * *"   # monthly
  workflow_dispatch:

permissions:
  contents: write   # ONLY what we need

jobs:
  update-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate GitHub stats images
        env:
          GITHUB_USER: ${{ secrets.USER_NAME }}
          GITHUB_TOKEN: ${{ secrets.USER_TOKEN }}
        run: |
          python main.py

      - name: Commit updated images
        run: |
          set -e
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          # HARD RESET workflow files (prevents GitHub rejection)
          git checkout -- .github/workflows
      
          # Add ONLY generated images
          git add src/github_stats.png src/github_activity.png
      
          # Exit cleanly if nothing changed
          if git diff --cached --quiet; then
            echo "No image changes to commit"
            exit 0
          fi
      
          git commit -m "chore: update GitHub stats images [skip ci]"
          git push origin master
